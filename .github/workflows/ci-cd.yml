name: Terraform

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TF_VAR_ssh_public_key: ${{ secrets.TF_VAR_SSH_PUBLIC_KEY }}
  TF_VAR_jenkins_admin_password: ${{ secrets.TF_VAR_jenkins_admin_password }}
  TF_VAR_docker_hub_username: ${{ secrets.TF_VAR_docker_hub_username }}
  TF_VAR_docker_hub_password: ${{ secrets.TF_VAR_docker_hub_password }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Plan
        if: github.event_name == 'push' || inputs.action == 'apply'
        run: terraform plan

      - name: Terraform Apply
        if: github.event_name == 'push' || inputs.action == 'apply'
        run: terraform apply -auto-approve

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: terraform destroy -auto-approve